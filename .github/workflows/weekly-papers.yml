name: Weekly AI/ML Papers Digest

on:
  schedule:
    # KST 일요일 23:00 = UTC 일요일 14:00
    - cron: '0 14 * * SUN'
  workflow_dispatch:
    inputs:
      topic_id:
        type: string
        description: 'GeekNews topic id 수동 지정 (자동 탐지 우회, 선택)'
        required: false
        default: ''
      dry_run:
        type: boolean
        description: 'Dry-run (발행 없이 마크다운만 출력)'
        required: false
        default: false

env:
  PYTHON_VERSION: '3.11'
  TZ: 'Asia/Seoul'

jobs:
  generate-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jinja2 pyyaml

      - name: Run weekly papers digest
        id: digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          BLOG_REPO: ${{ vars.BLOG_REPO || 'joyuno/joyuno.github.io' }}
          BLOG_BRANCH: ${{ vars.BLOG_BRANCH || 'gh-pages' }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.topic_id }}" ]; then
            ARGS="$ARGS --topic-id ${{ github.event.inputs.topic_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python src/main_weekly.py $ARGS

      - name: Upload artifact (rendered JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-papers-${{ github.run_number }}
          path: output/weekly_papers.json
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "## 📚 Weekly Papers Digest 실행 결과" >> $GITHUB_STEP_SUMMARY
          echo "- **시간**: $(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "- **상태**: ${{ steps.digest.outcome }}" >> $GITHUB_STEP_SUMMARY
