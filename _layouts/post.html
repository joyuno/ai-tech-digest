---
layout: default
---
<article class="post-content">
  <header class="page-hero">
    <h1>{{ page.title }}</h1>
    <p><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y년 %m월 %d일" }}</time>{% if page.tags %} · {% for t in page.tags %}<span style="color:var(--text-muted);font-size:0.85rem;">#{{ t }} </span>{% endfor %}{% endif %}</p>
  </header>

  {{ content }}
</article>
