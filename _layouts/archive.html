---
layout: default
---
<header class="page-hero">
  <h1>전체 보기</h1>
  <p class="meta">매일 KST 8시 자동 업데이트 · grok-4.1-fast 요약</p>
</header>

<div class="search-wrap">
  <input type="text" id="search-input" placeholder="검색...">
  <ul id="search-results"></ul>
</div>

{% if site.posts.size == 0 %}
<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">아직 포스트가 없습니다.</p>
{% else %}
<ul class="post-list" id="post-list">
  {% for post in site.posts %}
  <li>
    <a href="{{ post.url | relative_url }}">
      <span class="pl-date">{{ post.date | date: "%Y.%m.%d" }}</span>
      <span class="pl-title">{{ post.title }}</span>
    </a>
  </li>
  {% endfor %}
</ul>

<nav class="pagination js-pagination" aria-label="페이지" id="post-pagination" hidden>
  <button type="button" class="pg-btn" data-dir="prev">← 최신</button>
  <span class="page-num"><span id="pg-cur">1</span> / <span id="pg-total">1</span></span>
  <button type="button" class="pg-btn" data-dir="next">이전 →</button>
</nav>

<style>
  .pagination .pg-btn {
    padding: 0.5rem 0.85rem;
    border-radius: var(--r-sm);
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    border: 1px solid var(--border);
    background: var(--surface);
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 150ms, color 150ms;
  }
  .pagination .pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pagination .pg-btn:disabled { color: var(--text-muted); opacity: 0.5; cursor: not-allowed; }
</style>
{% endif %}

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" defer></script>
<script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (window.initFuseSearch) {
      window.initFuseSearch({
        searchJsonUrl: '{{ "/search.json" | relative_url }}',
        inputId: 'search-input',
        resultsId: 'search-results',
      });
    }
  });
</script>
<script>
  // 클라이언트사이드 페이지네이션 — jekyll-paginate v1 은 /archives/ 경로 지원 X
  (function() {
    const PAGE_SIZE = 20;
    const list = document.getElementById('post-list');
    const nav = document.getElementById('post-pagination');
    if (!list || !nav) return;
    const items = Array.from(list.children);
    const total = Math.ceil(items.length / PAGE_SIZE);
    if (total <= 1) return;

    let cur = 1;
    const elPrev = nav.querySelector('[data-dir="prev"]');
    const elNext = nav.querySelector('[data-dir="next"]');
    const elCur  = document.getElementById('pg-cur');
    const elTot  = document.getElementById('pg-total');
    elTot.textContent = total;
    nav.hidden = false;

    const render = (p) => {
      cur = p;
      const start = (p - 1) * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      items.forEach((li, i) => { li.style.display = (i >= start && i < end) ? '' : 'none'; });
      elCur.textContent = p;
      elPrev.disabled = p === 1;
      elNext.disabled = p === total;
    };
    elPrev.addEventListener('click', () => { if (cur > 1) { render(cur - 1); window.scrollTo({top:0, behavior:'smooth'}); } });
    elNext.addEventListener('click', () => { if (cur < total) { render(cur + 1); window.scrollTo({top:0, behavior:'smooth'}); } });
    render(1);
  })();
</script>
