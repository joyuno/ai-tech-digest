<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <script>
    (function(){ try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); } catch(_) {} })();
  </script>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
  <script>window.OIIA_CAT_URL = '{{ "/assets/favicon/oiia-cat.png" | relative_url }}';</script>
  <script src="{{ '/assets/js/favicon.js' | relative_url }}" defer></script>
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --sidebar-w: 240px;
      --topbar-h: 3rem;

      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-pill: 9999px;

      --m-fast: 150ms;
      --m-std: 250ms;
      --ease-std: cubic-bezier(0.4, 0, 0.2, 1);

      --grad-mark: linear-gradient(135deg in oklch, oklch(0.61 0.20 252), oklch(0.74 0.13 195));

      --bg:        oklch(0.16 0.014 250);
      --surface:   oklch(0.22 0.018 250);
      --surface-2: oklch(0.26 0.020 250);
      --heading:   oklch(0.94 0.005 240);
      --text:      oklch(0.85 0.012 240);
      --text-body: oklch(0.78 0.014 240);
      --text-muted:oklch(0.60 0.015 240);
      --border:    oklch(0.32 0.020 250);
      --border-strong: oklch(0.42 0.022 250);
      --code-bg:   oklch(0.24 0.018 250);
      --tag-bg:    oklch(0.28 0.020 250);

      --accent:        oklch(0.74 0.16 252);
      --accent-hover:  oklch(0.82 0.14 252);
      --accent-bg:     oklch(0.30 0.07 252);

      --shadow-1: 0 1px 3px rgba(0,0,0,0.30);
      --shadow-2: 0 2px 8px rgba(0,0,0,0.45);
    }
    [data-theme="light"] {
      --bg:           oklch(0.97 0.003 250);
      --surface:      oklch(1 0 0);
      --surface-2:    oklch(0.96 0.005 250);
      --heading:      oklch(0.18 0.014 250);
      --text:         oklch(0.30 0.018 260);
      --text-body:    oklch(0.35 0.018 260);
      --text-muted:   oklch(0.50 0.014 260);
      --border:       oklch(0.90 0.005 250);
      --border-strong:oklch(0.78 0.010 250);
      --code-bg:      oklch(0.95 0.005 250);
      --tag-bg:       oklch(0.93 0.008 250);
      --accent:       oklch(0.55 0.18 263);
      --accent-hover: oklch(0.45 0.20 263);
      --accent-bg:    oklch(0.92 0.04 252);
      --shadow-1: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-2: 0 2px 8px rgba(0,0,0,0.10);
    }
    body { background: radial-gradient(ellipse 90% 70% at 50% 25%, var(--surface-2) 0%, var(--bg) 65%); }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--text-body);
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    code, pre, .mono, .tabular { font-family: 'JetBrains Mono', SFMono-Regular, Menlo, Consolas, monospace; }
    .tabular { font-variant-numeric: tabular-nums; }

    /* lucide icon (inline 본문에서 자동 치환) */
    i[data-lucide] {
      display: inline-block;
      width: 1em; height: 1em;
      vertical-align: -2px;
      stroke-width: 2;
    }
    i[data-lucide] svg { width: 100%; height: 100%; }
    /* 카테고리·source 헤더 옆 아이콘은 살짝 키움 */
    .post-content h2 i[data-lucide] { width: 1.05em; height: 1.05em; margin-right: 0.2em; color: var(--accent); }
    .post-content .category-tag i[data-lucide] { width: 0.9em; height: 0.9em; margin-right: 0.25em; vertical-align: -1px; }
    a { color: var(--accent); text-decoration: none; transition: color var(--m-fast) var(--ease-std); }
    a:hover { color: var(--accent-hover); }

    /* sidebar */
    #sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-w); height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      display: flex; flex-direction: column;
      z-index: 100;
      overflow-y: auto;
      transition: transform var(--m-std) var(--ease-std);
    }
    .brand {
      display: block;
      padding: 0.4rem 0.5rem 1.1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .brand-name {
      font-weight: 700; font-size: 1.2rem;
      letter-spacing: -0.02em;
      background: var(--grad-mark);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .nav { display: flex; flex-direction: column; gap: 0.15rem; }
    .nav a {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 0.75rem;
      color: var(--text);
      border-radius: var(--r-sm);
      font-size: 0.9rem;
      font-weight: 500;
      transition: background var(--m-fast) var(--ease-std), color var(--m-fast) var(--ease-std);
    }
    .nav a:hover { background: var(--surface-2); color: var(--accent); }
    .nav a.active { background: var(--accent-bg); color: var(--accent); }
    .nav a .arrow { font-family: 'JetBrains Mono', monospace; opacity: 0.5; font-size: 0.85em; }

    .sidebar-footer { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
    .theme-toggle {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--r-sm);
      padding: 0.45rem 0.7rem;
      cursor: pointer;
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.85rem; font-family: inherit;
      width: 100%;
      transition: border-color var(--m-fast) var(--ease-std), color var(--m-fast) var(--ease-std);
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .theme-toggle .theme-icon { font-size: 1.05rem; line-height: 1; }

    /* main */
    #main-wrapper {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
    }
    .main-content {
      max-width: 880px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* page hero */
    .page-hero {
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .page-hero h1 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--heading);
      margin-bottom: 0.4rem;
      line-height: 1.25;
    }
    .page-hero .meta {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
    }

    /* search */
    .search-wrap {
      margin: 0 0 1.5rem;
      position: relative;
    }
    #search-input {
      width: 100%;
      padding: 0.7rem 0.95rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color var(--m-fast) var(--ease-std), background var(--m-fast) var(--ease-std);
    }
    #search-input:focus { border-color: var(--accent); background: var(--bg); }
    #search-input::placeholder { color: var(--text-muted); }
    #search-results { list-style: none; margin: 0.4rem 0 0; padding: 0; }
    #search-results li a {
      display: flex; align-items: baseline; gap: 0.85rem;
      padding: 0.55rem 0.7rem;
      color: var(--text);
      border-radius: var(--r-sm);
      font-size: 0.9rem;
    }
    #search-results li a:hover { background: var(--surface-2); color: var(--accent); }
    #search-results .sr-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* post list (1-line per item) */
    .post-list { list-style: none; padding: 0; margin: 0; }
    .post-list li { border-bottom: 1px solid var(--border); }
    .post-list li:first-child { border-top: 1px solid var(--border); }
    .post-list a {
      display: flex; align-items: baseline; gap: 1rem;
      padding: 0.85rem 0.6rem;
      color: var(--text);
      transition: background var(--m-fast) var(--ease-std), color var(--m-fast) var(--ease-std);
      text-decoration: none;
    }
    .post-list a:hover { background: var(--surface-2); color: var(--accent); }
    .post-list .pl-date {
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      width: 5.5rem;
    }
    .post-list .pl-title {
      flex: 1;
      font-weight: 500;
      font-size: 0.94rem;
      line-height: 1.45;
      color: var(--heading);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .post-list a:hover .pl-title { color: var(--accent); }

    /* pagination */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      margin: 2rem 0 0;
      padding: 1rem 0;
      gap: 1rem;
    }
    .pagination a, .pagination .page-num {
      padding: 0.5rem 0.85rem;
      border-radius: var(--r-sm);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      border: 1px solid var(--border);
      background: var(--surface);
      font-variant-numeric: tabular-nums;
    }
    .pagination a:hover { border-color: var(--accent); color: var(--accent); }
    .pagination .disabled {
      color: var(--text-muted); opacity: 0.5;
      pointer-events: none;
    }
    .pagination .page-num { background: var(--surface-2); border: 0; }

    /* post content */
    .post-content { color: var(--text-body); }
    .post-content h1, .post-content h2, .post-content h3, .post-content h4 {
      color: var(--heading); letter-spacing: -0.02em; font-weight: 700;
    }
    .post-content h1 { font-size: 1.7rem; margin: 0 0 1rem; padding-bottom: 0.7rem; border-bottom: 1px solid var(--border); }
    .post-content h2 { font-size: 1.2rem; margin: 2rem 0 0.85rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
    .post-content h3 { font-size: 1rem; margin: 1.4rem 0 0.55rem; font-weight: 600; }
    .post-content p { margin-bottom: 1rem; line-height: 1.7; }
    .post-content ul, .post-content ol { margin: 0 0 1rem 1.4rem; }
    .post-content li { margin-bottom: 0.3rem; line-height: 1.65; }
    .post-content code { background: var(--code-bg); padding: 0.12rem 0.4rem; border-radius: var(--r-sm); font-size: 0.86em; color: var(--heading); }
    .post-content pre { background: var(--code-bg); padding: 1rem; border-radius: var(--r-md); overflow-x: auto; margin-bottom: 1rem; border: 1px solid var(--border); }
    .post-content pre code { background: none; padding: 0; }
    .post-content blockquote {
      margin: 1.2rem 0; padding: 0.8rem 1rem;
      border-left: 3px solid var(--accent);
      background: var(--accent-bg);
      color: var(--text-body);
      border-radius: 0 var(--r-md) var(--r-md) 0;
    }
    .post-content blockquote p:last-child { margin-bottom: 0; }
    .post-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    .post-content th, .post-content td { padding: 0.55rem 0.8rem; border-bottom: 1px solid var(--border); text-align: left; }
    .post-content th { background: var(--code-bg); color: var(--heading); font-weight: 600; }
    .post-content a { font-weight: 500; }

    /* digest-item card (existing posts use this class) */
    .post-content .digest-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 1.1rem 1.2rem;
      margin: 0.85rem 0;
      box-shadow: var(--shadow-1);
      transition: box-shadow var(--m-std) var(--ease-std), border-color var(--m-fast) var(--ease-std), transform var(--m-std) var(--ease-std);
      overflow: hidden;
    }
    /* thumbnail — arxiv figure / github README 이미지.
       비율 그대로 보여줘야 architecture 가 보임. cover crop / 220px 강제 제한 X */
    .post-content .digest-thumb {
      margin: -1.1rem -1.2rem 0.85rem;
      background: #ffffff;       /* 순백 — figure 가독성용 */
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      min-height: 140px;          /* 너무 납작해지지 않게 */
      overflow: hidden;
    }
    .post-content .digest-thumb img {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      max-height: 560px;          /* 매우 tall 한 이미지만 캡, 보통은 자연 비율 */
      object-fit: contain;
    }
    @media (max-width: 720px) {
      .post-content .digest-thumb { min-height: 100px; }
      .post-content .digest-thumb img { max-height: 380px; }
    }
    .post-content .digest-item:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-2);
      transform: translateY(-1px);
    }
    .post-content .digest-item h3 { margin: 0 0 0.5rem; font-size: 1rem; line-height: 1.45; font-weight: 600; }
    .post-content .digest-item h3 a { color: var(--heading); font-weight: 600; }
    .post-content .digest-item h3 a:hover { color: var(--accent); }
    .post-content .categories { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.6rem; }
    .post-content .category-tag {
      display: inline-block; padding: 0.18rem 0.6rem;
      font-size: 0.7rem; font-weight: 500;
      background: var(--tag-bg); color: var(--text-muted);
      border-radius: var(--r-pill); border: 1px solid var(--border);
    }
    .post-content .keywords { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.5rem 0; }
    .post-content .keywords code {
      background: var(--surface); border: 1px solid var(--border);
      padding: 0.2rem 0.65rem; border-radius: var(--r-pill);
      color: var(--text); font-size: 0.78rem;
    }

    /* sub-tags — 카테고리 안의 세분화 라벨 (#Transformer 같은 형태) */
    .post-content .sub-tags {
      display: flex; flex-wrap: wrap; gap: 0.3rem;
      margin: 0.4rem 0 0.5rem;
    }
    .post-content .sub-tag {
      font-size: 0.72rem;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 0.12rem 0.45rem;
      border-radius: var(--r-sm);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.01em;
    }

    /* item-meta — venue / repo / stars / upvotes 작은 메타 pill */
    .post-content .item-meta {
      display: flex; flex-wrap: wrap; gap: 0.3rem;
      margin-top: 0.7rem;
      padding-top: 0.65rem;
      border-top: 1px dashed var(--border);
    }
    .post-content .meta-pill {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.7rem;
      padding: 0.18rem 0.55rem;
      border-radius: var(--r-pill);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      line-height: 1.4;
    }
    .post-content .meta-pill i[data-lucide] {
      width: 0.85em; height: 0.85em; vertical-align: -1px;
    }
    .post-content .meta-pill.meta-tier1 {
      background: oklch(0.95 0.05 30); border-color: oklch(0.85 0.10 30); color: oklch(0.45 0.15 30);
    }
    .post-content .meta-pill.meta-tier2 {
      background: oklch(0.96 0.04 50); border-color: oklch(0.88 0.08 50); color: oklch(0.50 0.12 50);
    }
    .post-content .meta-pill.meta-submitted {
      background: var(--surface-2); color: var(--text-muted);
    }
    .post-content .meta-pill.meta-repo,
    .post-content .meta-pill.meta-stars {
      color: var(--text); border-color: var(--border-strong);
    }
    .post-content .meta-pill.meta-hf {
      background: oklch(0.96 0.04 80); border-color: oklch(0.88 0.08 80); color: oklch(0.50 0.12 80);
    }

    /* footer */
    .footer {
      margin-top: 3rem; padding: 1.5rem 0;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
    }
    .footer-mark { color: var(--accent); font-weight: 600; }

    /* mobile */
    .mobile-header {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      align-items: center; padding: 0 1rem;
      z-index: 99;
    }
    .menu-btn { background: none; border: 0; color: var(--text); padding: 0.4rem 0.6rem; cursor: pointer; border-radius: var(--r-sm); font-size: 0.95rem; font-weight: 500; }
    .menu-btn:hover { background: var(--surface-2); }
    .mobile-title { flex: 1; text-align: center; font-weight: 600; color: var(--heading); }

    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main-wrapper { margin-left: 0; }
      .mobile-header { display: flex; }
      .main-content { padding: calc(var(--topbar-h) + 1.25rem) 1rem 2.5rem; }
      .page-hero h1 { font-size: 1.4rem; }
      .post-list .pl-date { width: 4.5rem; font-size: 0.72rem; }
      .post-list .pl-title { font-size: 0.88rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      :root { --m-fast: 0ms; --m-std: 0ms; }
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <header class="mobile-header">
    <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" aria-label="메뉴 열기">메뉴</button>
    <span class="mobile-title">{{ site.title }}</span>
    <span class="menu-btn" style="visibility:hidden;">.</span>
  </header>

  <aside id="sidebar">
    <a href="{{ '/' | relative_url }}" class="brand">
      <span class="brand-name">joyuno's blog</span>
    </a>

    <nav class="nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == "/" %}class="active"{% endif %}>최신</a>
      <a href="https://joyuno.github.io">
        <span>블로그로 돌아가기</span><span class="arrow">→</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="theme-toggle" data-theme-toggle aria-label="테마 전환">
        <span class="theme-icon">☾</span>
        <span class="theme-label">테마</span>
      </button>
    </div>
  </aside>

  <div id="main-wrapper">
    <main class="main-content">
      {{ content }}
      <footer class="footer">
        <p>© {{ site.time | date: '%Y' }} <span class="footer-mark">AI Tech</span> · auto-curated by grok-4.1-fast</p>
      </footer>
    </main>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
  </script>
</body>
</html>
